name: Build and deploy Node.js app to Azure Web App - orvio-admin-dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: orvio-admin-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install & Build
        working-directory: ./frontend
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: |
          npm install
          npm run build

      - name: Prepare deploy package
        run: |
          mkdir deploy
          cp -r frontend/build deploy/
          cp frontend/package.json deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E43F31F670BE4D5CBD7C0EBCDE18048F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BB6BF064A6294CA1A2ADBA78798E0CA2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4EE6A8C9121D4F7FA74BEC31A8C9E9DF }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'orvio-admin-dashboard'
          slot-name: 'Production'
          package: .